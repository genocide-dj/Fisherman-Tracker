version: "3.9"

services:
  fisherman-tracker:
    build: .
    container_name: fisherman-tracker
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data          # mount your videos here
      - ./outputs:/app/outputs    # results written here
      - ./models:/app/models      # YOLO weights cache
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # Optional: GPU variant — uncomment if you have NVIDIA GPU + nvidia-docker2
